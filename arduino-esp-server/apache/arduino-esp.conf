<VirtualHost *:8181>
    ServerName arduino-esp.local
    DocumentRoot /var/www/arduino-esp-server/public

    <Directory /var/www/arduino-esp-server/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/arduino-esp-error.log
    CustomLog ${APACHE_LOG_DIR}/arduino-esp-access.log combined
</VirtualHost>
